{% extends 'core/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm mt-5">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">Student Login</h3>
                
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }} 
                    <button class="btn btn-primary w-100 mt-3" type="submit">Log In</button>
                </form>
                
            </div>
        </div>
    </div>
</div>
{% endblock %}
